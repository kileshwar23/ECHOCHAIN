spring.application.name=ecochain

# Server
server.port=8080

# Database - H2 In-Memory (switch to PostgreSQL/MySQL for production)
spring.datasource.url=jdbc:h2:mem:ecochain_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=ecochain_jwt_super_secret_key_2025_do_not_share
app.jwt.expiration-ms=86400000

# Disable Eureka for local dev
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
